<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Lego v4 — Precise Proportions</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#020617; overflow:hidden; font-family:'SF Mono',monospace; display:flex; height:100vh; }
#left { flex:1; position:relative; }
#c { display:block; width:100%; height:100%; }
#panel {
  width:228px; background:#080d14; border-left:1px solid #0f172a;
  display:flex; flex-direction:column; overflow:hidden;
}
#ph { padding:12px 14px 8px; border-bottom:1px solid #0f172a; font-size:8px; letter-spacing:2px; color:#334155; }
#ph .an { font-size:13px; color:#e2e8f0; letter-spacing:0; margin-top:3px; }
#pb { flex:1; overflow-y:auto; padding:10px 12px; display:flex; flex-direction:column; gap:12px; }
#pb::-webkit-scrollbar { width:3px; }
#pb::-webkit-scrollbar-thumb { background:#1e293b; border-radius:2px; }
.st { font-size:7.5px; color:#334155; letter-spacing:2px; margin-bottom:5px; }
.fg { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; }
.fo { aspect-ratio:1; border-radius:6px; border:1.5px solid #1e293b; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:20px; background:#0a0f1a; transition:border-color .15s,transform .1s; }
.fo:hover { border-color:#334155; transform:scale(1.08); }
.fo.sel { border-color:#7c3aed; box-shadow:0 0 6px #7c3aed55; }
.hg { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; }
.ho { aspect-ratio:1; border-radius:6px; border:1.5px solid #1e293b; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; background:#0a0f1a; transition:border-color .15s,transform .1s; padding:3px; }
.ho:hover { border-color:#334155; transform:scale(1.08); }
.ho.sel { border-color:#059669; box-shadow:0 0 6px #05966955; }
.hi { font-size:14px; }
.hl { font-size:6.5px; color:#475569; }
.cr { display:flex; gap:4px; flex-wrap:wrap; }
.sw { width:24px; height:24px; border-radius:5px; cursor:pointer; border:2px solid transparent; transition:transform .1s,border-color .15s; }
.sw:hover { transform:scale(1.18); }
.sw.sel { border-color:white; }
.at { display:flex; gap:3px; }
.ab { flex:1; padding:5px 3px; border-radius:5px; border:1px solid #1e293b; cursor:pointer; text-align:center; font-size:10px; transition:background .15s,border-color .15s; }
.ab:hover { background:#0f172a; }
.ab.sel { border-color:#7c3aed; background:#1a0d2e; }
#kbd { position:absolute; bottom:10px; left:14px; font-size:9px; color:#1e3a5f; }
kbd { background:#0a0f1a; border:1px solid #1e293b; border-radius:3px; padding:1px 5px; color:#334155; font-family:inherit; }

/* ── CENTERED FIXED INPUT ── */
#chat-input {
  position:absolute; bottom:44px; left:50%; transform:translateX(-50%);
  width:300px; background:rgba(5,8,16,0.92); border:1px solid #312e81;
  border-radius:22px; padding:10px 20px; color:#c7d2fe;
  font:13px 'SF Mono',monospace; outline:none;
  opacity:0; pointer-events:none;
  transition:opacity .18s, border-color .15s;
  backdrop-filter:blur(12px);
  box-shadow:0 4px 24px rgba(0,0,0,.5);
}
#chat-input.open { opacity:1; pointer-events:all; }
#chat-input:focus { border-color:#6366f1; }
#chat-input::placeholder { color:#2d3561; }

/* ── TYPING INDICATOR in speech bubble ── */
.bubble-dots { display:inline-flex; gap:4px; align-items:center; height:14px; }
.bubble-dots span {
  width:6px; height:6px; border-radius:50%; background:#6366f1;
  animation:bdot 1.1s infinite;
}
.bubble-dots span:nth-child(2){ animation-delay:.2s; }
.bubble-dots span:nth-child(3){ animation-delay:.4s; }
@keyframes bdot{0%,60%,100%{opacity:.2;transform:scale(.8)}30%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div id="left"><canvas id="c"></canvas>
<div id="kbd"><kbd>M</kbd> meeting &nbsp;<kbd>R</kbd> reset &nbsp;<kbd>scroll</kbd> zoom</div>
<input id="chat-input" type="text" placeholder="말 걸어봐요..." autocomplete="off">
</div>
<div id="panel">
  <div id="ph">AVATAR EDITOR<div class="an" id="an">🔬 analyst</div></div>
  <div id="pb">
    <div><div class="st">AGENT</div><div class="at">
      <div class="ab sel" onclick="sA(0)">🔬<br><span style="font-size:6.5px;color:#475569">analyst</span></div>
      <div class="ab" onclick="sA(1)">✍️<br><span style="font-size:6.5px;color:#475569">writer</span></div>
      <div class="ab" onclick="sA(2)">🔍<br><span style="font-size:6.5px;color:#475569">reviewer</span></div>
    </div></div>
    <div><div class="st">FACE</div><div class="fg">
      <div class="fo sel" onclick="aF(this,'😐')">😐</div><div class="fo" onclick="aF(this,'🙂')">🙂</div>
      <div class="fo" onclick="aF(this,'😤')">😤</div><div class="fo" onclick="aF(this,'🤔')">🤔</div>
      <div class="fo" onclick="aF(this,'😎')">😎</div><div class="fo" onclick="aF(this,'🧐')">🧐</div>
      <div class="fo" onclick="aF(this,'😈')">😈</div><div class="fo" onclick="aF(this,'🤖')">🤖</div>
      <div class="fo" onclick="aF(this,'😴')">😴</div><div class="fo" onclick="aF(this,'😡')">😡</div>
      <div class="fo" onclick="aF(this,'🥸')">🥸</div><div class="fo" onclick="aF(this,'🥳')">🥳</div>
    </div></div>
    <div><div class="st">HAIR</div><div class="hg">
      <div class="ho sel" onclick="aH(this,'SHORT')"><div class="hi">▬</div><div class="hl">SHORT</div></div>
      <div class="ho" onclick="aH(this,'LONG')"><div class="hi">⬇</div><div class="hl">LONG</div></div>
      <div class="ho" onclick="aH(this,'SPIKY')"><div class="hi">⚡</div><div class="hl">SPIKY</div></div>
      <div class="ho" onclick="aH(this,'BUN')"><div class="hi">⭕</div><div class="hl">BUN</div></div>
      <div class="ho" onclick="aH(this,'CURLY')"><div class="hi">🌀</div><div class="hl">CURLY</div></div>
      <div class="ho" onclick="aH(this,'HELMET')"><div class="hi">⛑</div><div class="hl">HELMET</div></div>
      <div class="ho" onclick="aH(this,'PONYTAIL')"><div class="hi">🎀</div><div class="hl">PONYTAIL</div></div>
      <div class="ho" onclick="aH(this,'BALD')"><div class="hi">○</div><div class="hl">BALD</div></div>
    </div></div>
    <div><div class="st">HAIR COLOR</div><div class="cr" id="hc">
      <div class="sw sel" style="background:#1a1a1a" onclick="aHC(this,'#1a1a1a')"></div>
      <div class="sw" style="background:#4a2800" onclick="aHC(this,'#4a2800')"></div>
      <div class="sw" style="background:#b07030" onclick="aHC(this,'#b07030')"></div>
      <div class="sw" style="background:#f0c040" onclick="aHC(this,'#f0c040')"></div>
      <div class="sw" style="background:#d0d0d0" onclick="aHC(this,'#d0d0d0')"></div>
      <div class="sw" style="background:#ff6060" onclick="aHC(this,'#ff6060')"></div>
      <div class="sw" style="background:#5080ff" onclick="aHC(this,'#5080ff')"></div>
      <div class="sw" style="background:#7c3aed" onclick="aHC(this,'#7c3aed')"></div>
    </div></div>
    <div><div class="st">OUTFIT</div><div class="cr" id="bc">
      <div class="sw sel" style="background:#7c3aed" onclick="aBC(this,'#7c3aed')"></div>
      <div class="sw" style="background:#059669" onclick="aBC(this,'#059669')"></div>
      <div class="sw" style="background:#d97706" onclick="aBC(this,'#d97706')"></div>
      <div class="sw" style="background:#2563eb" onclick="aBC(this,'#2563eb')"></div>
      <div class="sw" style="background:#dc2626" onclick="aBC(this,'#dc2626')"></div>
      <div class="sw" style="background:#0891b2" onclick="aBC(this,'#0891b2')"></div>
      <div class="sw" style="background:#be185d" onclick="aBC(this,'#be185d')"></div>
      <div class="sw" style="background:#334155" onclick="aBC(this,'#334155')"></div>
    </div></div>
  </div>
</div>

<div id="errbox" style="position:fixed;top:0;left:0;right:0;background:#ff000099;color:#fff;font:12px monospace;padding:8px;z-index:9999;display:none;white-space:pre-wrap;"></div>
<script type="module">
import * as THREE from './three.module.js';

window.onerror = (msg,src,line,col,err) => {
  const b = document.getElementById('errbox');
  b.style.display='block';
  b.textContent = 'ERROR line '+line+': '+msg+'\n'+(err&&err.stack||'');
};
window.addEventListener('unhandledrejection', e => {
  const b = document.getElementById('errbox');
  b.style.display='block';
  b.textContent = 'PROMISE ERROR: '+e.reason;
});

try {

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

function resize(){
  const w=document.getElementById('left').clientWidth,h=innerHeight;
  renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix();
}
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x020617);
scene.fog=new THREE.FogExp2(0x020617,0.026);

const camera=new THREE.PerspectiveCamera(40,1,0.1,200);
camera.position.set(10,13,10); camera.lookAt(0,0.8,0);

scene.add(new THREE.AmbientLight(0x1a2a4a,2.5));
const sun=new THREE.DirectionalLight(0xffffff,3.5);
sun.position.set(8,18,8); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=0.1; sun.shadow.camera.far=60;
sun.shadow.camera.left=sun.shadow.camera.bottom=-16;
sun.shadow.camera.right=sun.shadow.camera.top=16;
sun.shadow.bias=-0.001; scene.add(sun);
const fillLight=new THREE.DirectionalLight(0x3355bb,1.0); fillLight.position.set(-4,5,-6); scene.add(fillLight);

resize(); window.addEventListener('resize',resize);

// Floor
const tg=new THREE.BoxGeometry(0.97,0.1,0.97);
for(let x=-7;x<=7;x++) for(let z=-7;z<=7;z++){
  const m=new THREE.MeshLambertMaterial({color:(x+z)%2===0?0x0b1728:0x0d1e35});
  const t=new THREE.Mesh(tg,m); t.position.set(x,-0.05,z); t.receiveShadow=true; scene.add(t);
}
const grid=new THREE.GridHelper(15,15,0x1e3a5f,0x1e3a5f);
grid.position.y=0.01; grid.material.opacity=0.3; grid.material.transparent=true; scene.add(grid);

// ── FACE TEXTURE (cylinder wrap) ──
function makeFaceTex(emoji){
  const W=512,H=256,cv=document.createElement('canvas');
  cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#ffd700'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,0,0,0.05)'; ctx.fillRect(0,H*0.88,W,H*0.12);

  const er=H*0.115, eyeY=H*0.35;
  // Default eyes
  const drawDefaultEyes=()=>{
    [[-1],[1]].forEach(([s])=>{
      const ex=W/2+s*er*2.3;
      ctx.beginPath(); ctx.ellipse(ex,eyeY,er*1.05,er*0.95,0,0,Math.PI*2);
      ctx.fillStyle='white'; ctx.fill();
      ctx.beginPath(); ctx.ellipse(ex+1,eyeY+1,er*0.52,er*0.58,0,0,Math.PI*2);
      ctx.fillStyle='#1a1a2e'; ctx.fill();
      ctx.beginPath(); ctx.arc(ex-er*0.28,eyeY-er*0.28,er*0.2,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.fill();
    });
  };
  const drawDefaultBrows=()=>{
    [[-1],[1]].forEach(([s])=>{
      const ex=W/2+s*er*2.3;
      ctx.beginPath(); ctx.moveTo(ex-er*1.0,eyeY-er*1.55);
      ctx.quadraticCurveTo(ex,eyeY-er*2.0,ex+er*1.0,eyeY-er*1.55);
      ctx.strokeStyle='#3a2200'; ctx.lineWidth=5; ctx.lineCap='round'; ctx.stroke();
    });
  };
  // Nose
  const drawNose=()=>{
    ctx.beginPath(); ctx.arc(W/2-4,H*0.52,3.2,0,Math.PI*2);
    ctx.arc(W/2+4,H*0.52,3.2,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.13)'; ctx.fill();
  };

  const arc=(cx,cy,r,frown)=>{
    ctx.beginPath(); ctx.arc(cx,frown?cy-r*0.55:cy,r,frown?0:Math.PI*0.1,frown?Math.PI:Math.PI*0.9);
    ctx.strokeStyle='#3a2200'; ctx.lineWidth=5.5; ctx.lineCap='round'; ctx.stroke();
  };

  const faceMap={
    '😐':()=>{ drawDefaultEyes(); drawDefaultBrows(); drawNose();
      ctx.beginPath(); ctx.moveTo(W/2-er*1.1,H*0.675); ctx.lineTo(W/2+er*1.1,H*0.675);
      ctx.strokeStyle='#3a2200'; ctx.lineWidth=5; ctx.lineCap='round'; ctx.stroke(); },
    '🙂':()=>{ drawDefaultEyes(); drawDefaultBrows(); drawNose(); arc(W/2,H*0.665,er*1.25,false); },
    '😤':()=>{
      drawDefaultEyes(); drawNose(); arc(W/2,H*0.70,er*1.05,true);
      [[-1,0.16],[1,-0.16]].forEach(([s,tl])=>{
        const ex=W/2+s*er*2.3;
        ctx.beginPath(); ctx.moveTo(ex-er*1.0,eyeY-er*1.4+tl*38); ctx.lineTo(ex+er*1.0,eyeY-er*1.4-tl*38);
        ctx.strokeStyle='#3a2200'; ctx.lineWidth=6.5; ctx.lineCap='round'; ctx.stroke();
      });
    },
    '🤔':()=>{ drawDefaultEyes(); drawNose(); arc(W/2+6,H*0.675,er*0.9,false);
      const ex=W/2+er*2.3;
      ctx.beginPath(); ctx.moveTo(ex-er,eyeY-er*1.55); ctx.lineTo(ex+er,eyeY-er*1.1);
      ctx.strokeStyle='#3a2200'; ctx.lineWidth=5; ctx.lineCap='round'; ctx.stroke();
      const ex2=W/2-er*2.3;
      ctx.beginPath(); ctx.moveTo(ex2-er,eyeY-er*1.55); ctx.quadraticCurveTo(ex2,eyeY-er*1.95,ex2+er,eyeY-er*1.55);
      ctx.strokeStyle='#3a2200'; ctx.lineWidth=5; ctx.lineCap='round'; ctx.stroke();
    },
    '😎':()=>{
      ctx.fillStyle='rgba(0,0,0,0.82)'; ctx.strokeStyle='#444'; ctx.lineWidth=4;
      [[-1],[1]].forEach(([s])=>{ const ex=W/2+s*er*2.3; ctx.beginPath(); ctx.arc(ex,eyeY,er*1.15,0,Math.PI*2); ctx.fill(); ctx.stroke(); });
      ctx.strokeStyle='#666'; ctx.lineWidth=4;
      ctx.beginPath(); ctx.moveTo(W/2-er*1.15,eyeY); ctx.lineTo(W/2+er*1.15,eyeY); ctx.stroke();
      drawDefaultBrows(); drawNose(); arc(W/2,H*0.665,er*1.2,false);
    },
    '🧐':()=>{
      drawDefaultBrows(); drawNose(); arc(W/2,H*0.67,er*0.95,false);
      const ex=W/2-er*2.3;
      ctx.strokeStyle='#b8860b'; ctx.lineWidth=4.5;
      ctx.beginPath(); ctx.arc(ex,eyeY,er*1.2,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(ex,eyeY,er*0.55,0,Math.PI*2); ctx.fillStyle='#1a1a2e'; ctx.fill();
      ctx.beginPath(); ctx.moveTo(ex+er*1.2,eyeY+er*0.5); ctx.lineTo(ex+er*1.9,eyeY+er*2.0); ctx.stroke();
      const ex2=W/2+er*2.3;
      ctx.beginPath(); ctx.ellipse(ex2,eyeY,er*1.05,er*0.95,0,0,Math.PI*2); ctx.fillStyle='white'; ctx.fill();
      ctx.beginPath(); ctx.ellipse(ex2+1,eyeY+1,er*0.52,er*0.58,0,0,Math.PI*2); ctx.fillStyle='#1a1a2e'; ctx.fill();
    },
    '😴':()=>{
      drawDefaultBrows(); drawNose();
      [[-1],[1]].forEach(([s])=>{ const ex=W/2+s*er*2.3;
        ctx.beginPath(); ctx.moveTo(ex-er*1.05,eyeY+er*0.2); ctx.lineTo(ex+er*1.05,eyeY+er*0.2);
        ctx.strokeStyle='#3a2200'; ctx.lineWidth=5; ctx.lineCap='round'; ctx.stroke();
      });
      ctx.font='bold 20px serif'; ctx.fillStyle='rgba(80,80,80,0.55)';
      ctx.textAlign='right'; ctx.textBaseline='middle'; ctx.fillText('z z z',W-30,eyeY-er*2);
      arc(W/2,H*0.675,er*0.85,false);
    },
    '🥸':()=>{
      ctx.strokeStyle='#5a4010'; ctx.lineWidth=5.5;
      [[-1],[1]].forEach(([s])=>{ const ex=W/2+s*er*2.3;
        ctx.beginPath(); ctx.arc(ex,eyeY,er*1.15,0,Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.ellipse(ex,eyeY,er*0.52,er*0.58,0,0,Math.PI*2); ctx.fillStyle='#1a1a2e'; ctx.fill();
      });
      ctx.beginPath(); ctx.moveTo(W/2-er*1.15,eyeY); ctx.lineTo(W/2+er*1.15,eyeY); ctx.stroke();
      // Big mustache
      ctx.beginPath(); ctx.moveTo(W/2-er*1.8,H*0.58);
      ctx.bezierCurveTo(W/2-er*0.5,H*0.52,W/2+er*0.5,H*0.52,W/2+er*1.8,H*0.58);
      ctx.bezierCurveTo(W/2+er*0.8,H*0.66,W/2-er*0.8,H*0.66,W/2-er*1.8,H*0.58);
      ctx.fillStyle='#4a2800'; ctx.fill();
      drawDefaultBrows();
    },
    '😈':()=>{
      drawDefaultEyes(); drawNose(); arc(W/2,H*0.665,er*1.2,false);
      [[-1,-0.15],[1,0.15]].forEach(([s,tl])=>{
        const ex=W/2+s*er*2.3;
        ctx.beginPath(); ctx.moveTo(ex-er*1.0,eyeY-er*1.4+tl*38); ctx.lineTo(ex+er*1.0,eyeY-er*1.4-tl*38);
        ctx.strokeStyle='#4a0080'; ctx.lineWidth=6.5; ctx.lineCap='round'; ctx.stroke();
      });
    },
    '🤖':()=>{
      [[-1],[1]].forEach(([s])=>{ const ex=W/2+s*er*2.2;
        ctx.fillStyle='#00ff99'; ctx.strokeStyle='#00aa66'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.rect(ex-er*0.95,eyeY-er*0.72,er*1.9,er*1.44); ctx.fill(); ctx.stroke();
        ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.fillRect(ex-er*0.42,eyeY-er*0.32,er*0.85,er*0.65);
      });
      ctx.strokeStyle='#00aa66'; ctx.lineWidth=4;
      ctx.strokeRect(W/2-er*1.4,H*0.645,er*2.8,er*0.9);
      for(let i=1;i<5;i++){ ctx.beginPath(); ctx.moveTo(W/2-er*1.4+i*er*2.8/5,H*0.645); ctx.lineTo(W/2-er*1.4+i*er*2.8/5,H*0.645+er*0.9); ctx.strokeStyle='rgba(0,170,102,0.4)'; ctx.lineWidth=2; ctx.stroke(); }
    },
    '😡':()=>{
      [[-1,0.22],[1,-0.22]].forEach(([s,tl])=>{
        const ex=W/2+s*er*2.3;
        ctx.beginPath(); ctx.ellipse(ex,eyeY,er*1.05,er*0.95,0,0,Math.PI*2); ctx.fillStyle='white'; ctx.fill();
        ctx.beginPath(); ctx.ellipse(ex+s*er*0.3,eyeY+1,er*0.52,er*0.58,0,0,Math.PI*2); ctx.fillStyle='#1a1a2e'; ctx.fill();
        ctx.beginPath(); ctx.moveTo(ex-er*1.2,eyeY-er*1.35+tl*48); ctx.lineTo(ex+er*1.2,eyeY-er*1.35-tl*48);
        ctx.strokeStyle='#5a1a00'; ctx.lineWidth=7.5; ctx.lineCap='round'; ctx.stroke();
      });
      drawNose(); arc(W/2,H*0.71,er*1.05,true);
    },
    '🥳':()=>{
      drawDefaultEyes(); drawDefaultBrows(); drawNose(); arc(W/2,H*0.66,er*1.25,false);
      // Party hat
      ctx.fillStyle='#ff4488';
      ctx.beginPath(); ctx.moveTo(W/2,eyeY-er*4.8); ctx.lineTo(W/2-er*1.5,eyeY-er*1.8); ctx.lineTo(W/2+er*1.5,eyeY-er*1.8); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#ffdd00'; ctx.beginPath(); ctx.arc(W/2,eyeY-er*4.8,er*0.32,0,Math.PI*2); ctx.fill();
      // Streamers
      ['#ff88cc','#88ffcc','#ffcc44'].forEach((col,i)=>{
        ctx.strokeStyle=col; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(W/2+(i-1)*er*1.2,eyeY-er*2.2);
        ctx.quadraticCurveTo(W/2+(i-1)*er*2,eyeY-er*0.5,W/2+(i-1)*er*2.5,eyeY-er*0.1);
        ctx.stroke();
      });
    },
  };
  (faceMap[emoji]||faceMap['😐'])();
  return new THREE.CanvasTexture(cv);
}

// ── PRECISE HEAD (cylinder) ──
function makeHead(emoji){
  const g=new THREE.Group();
  const skin=()=>new THREE.MeshLambertMaterial({color:0xffd700});
  const tex=makeFaceTex(emoji);
  // Main cylinder — rotation.y=PI puts face texture at +Z (toward camera)
  const cyl=new THREE.Mesh(new THREE.CylinderGeometry(0.24,0.25,0.46,32,1,true),new THREE.MeshLambertMaterial({map:tex,side:THREE.DoubleSide}));
  cyl.rotation.y=Math.PI;
  g.add(cyl);
  // Caps
  const tc=new THREE.Mesh(new THREE.CircleGeometry(0.24,32),skin()); tc.rotation.x=-Math.PI/2; tc.position.y=0.23; g.add(tc);

// ── TORSO (reference image: trapezoid, wider shoulders) ──
function makeTorso(hex){
  const g=new THREE.Group();
  const c=new THREE.Color(hex);
  const mat=new THREE.MeshLambertMaterial({color:c});
  const dark=new THREE.MeshLambertMaterial({color:c.clone().lerp(new THREE.Color(0),0.22)});
  const stud=new THREE.MeshLambertMaterial({color:c.clone().lerp(new THREE.Color(0xffffff),0.2)});

  // Main torso box — matches reference: rectangular, not tapered
  const body=new THREE.Mesh(new THREE.BoxGeometry(0.65,0.52,0.32),mat.clone());
  body.position.y=0; g.add(body);

  // Shoulder ridge (slight overhang at top)
  const shoulder=new THREE.Mesh(new THREE.BoxGeometry(0.72,0.07,0.35),dark.clone());
  shoulder.position.y=0.295; g.add(shoulder);

  // Neck collar opening
  const collar=new THREE.Mesh(new THREE.CylinderGeometry(0.115,0.115,0.1,16),new THREE.MeshLambertMaterial({color:new THREE.Color(hex).lerp(new THREE.Color(0xffd700),0.5)}));
  collar.position.y=0.31; g.add(collar);

  // Top studs × 2
  const sg=new THREE.CylinderGeometry(0.078,0.078,0.065,12);
  [-0.165,0.165].forEach(x=>{
    const s=new THREE.Mesh(sg,stud.clone()); s.position.set(x,0.345,0); g.add(s);
  });

  // Hip piece (bottom, slightly narrower, different shade)
  const hip=new THREE.Mesh(new THREE.BoxGeometry(0.63,0.13,0.33),dark.clone());
  hip.position.y=-0.325; g.add(hip);

  // Arm socket connector knobs (round cylinder on each side)
  [-1,1].forEach(s=>{
    const knob=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,0.14,16),dark.clone());
    knob.rotation.z=Math.PI/2; knob.position.set(s*0.38,0.12,0); g.add(knob);

    const hole=new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.055,0.05,10),new THREE.MeshLambertMaterial({color:new THREE.Color(hex).lerp(new THREE.Color(0),0.45)}));
    hole.rotation.z=Math.PI/2; hole.position.set(s*0.44,0.12,0); g.add(hole);
  });

  g.traverse(c=>{if(c.isMesh)c.castShadow=true;});

}

// ── HAIR ──
function mkMesh(geo,mat,x,y,z){ const o=new THREE.Mesh(geo,mat); o.position.set(x,y,z); return o; }

// ── LEGO 헤어 클립 베이스 ── 스터드 위에 딱 얹히는 링
function addClipBase(g,mat){
  // 바깥 림 — 머리 실린더 위에 걸치는 플랜지
  g.add(mkMesh(new THREE.CylinderGeometry(0.268,0.268,0.048,24),mat,0,0.024,0));
  // 안쪽 스터드 홀 (어두운 색으로 파인 느낌)
  const holeMat=new THREE.MeshLambertMaterial({color:0x0a0a12});
  g.add(mkMesh(new THREE.CylinderGeometry(0.098,0.098,0.052,16),holeMat,0,0.026,0));
}

function makeHair(style,color){
  const g=new THREE.Group();
  const c=new THREE.Color(color);
  const m=()=>new THREE.MeshLambertMaterial({color:c.clone()});
  const md=()=>new THREE.MeshLambertMaterial({color:c.clone().lerp(new THREE.Color(0),0.18)});

  switch(style){
    case 'SHORT':{
      addClipBase(g,m());
      // 캡 (머리 전체 덮는 납작한 원통)
      g.add(mkMesh(new THREE.CylinderGeometry(0.262,0.262,0.11,24),m(),0,0.079,0));
      // 측면 날개 — 귀 옆으로 내려오는 파츠
      [-1,1].forEach(s=>{
        g.add(mkMesh(new THREE.BoxGeometry(0.09,0.2,0.28),md(),s*0.262,-0.055,0));
      });
      break;}
    case 'LONG':{
      addClipBase(g,m());
      // 캡
      g.add(mkMesh(new THREE.CylinderGeometry(0.265,0.265,0.09,24),m(),0,0.069,0));
      // 양쪽 머리카락 패널
      [-1,1].forEach(s=>{g.add(mkMesh(new THREE.BoxGeometry(0.088,0.54,0.27),m(),s*0.268,-0.21,0));});
      // 뒷 패널
      g.add(mkMesh(new THREE.BoxGeometry(0.52,0.46,0.078),m(),0,-0.18,-0.218));
      break;}
    case 'SPIKY':{
      addClipBase(g,m());
      g.add(mkMesh(new THREE.CylinderGeometry(0.265,0.265,0.07,24),m(),0,0.059,0));
      [[-0.14,0.36,0.02],[0,0.42,0.01],[0.14,0.36,0.02],[-0.07,0.32,-0.09],[0.07,0.32,-0.09]].forEach(([x,h,z])=>{
        g.add(mkMesh(new THREE.ConeGeometry(0.055,h,6),m(),x,0.048+h/2,z));
      });break;}
    case 'BUN':{
      addClipBase(g,m());
      g.add(mkMesh(new THREE.CylinderGeometry(0.265,0.265,0.09,24),m(),0,0.069,0));
      g.add(mkMesh(new THREE.SphereGeometry(0.178,16,12),m(),0,0.29,0));
      break;}
    case 'CURLY':{
      addClipBase(g,m());
      g.add(mkMesh(new THREE.CylinderGeometry(0.308,0.288,0.21,24),m(),0,0.129,0));
      [[0.27,0.1,0.1],[-0.27,0.1,0.1],[0.27,0.1,-0.1],[-0.27,0.1,-0.1],[0,0.3,0.22],[0,0.3,-0.22]].forEach(([x,y,z])=>{
        g.add(mkMesh(new THREE.SphereGeometry(0.098,8,8),m(),x,y,z));
      });break;}
    case 'HELMET':{
      // 헬멧은 클립 없이 머리 전체를 감쌈
      const h=new THREE.Mesh(new THREE.CylinderGeometry(0.285,0.275,0.54,32),m()); h.position.y=0.16; g.add(h);
      const vis=new THREE.Mesh(new THREE.BoxGeometry(0.44,0.15,0.06),new THREE.MeshLambertMaterial({color:0x111122,transparent:true,opacity:0.82}));
      vis.position.set(0,0.04,0.276); g.add(vis); break;}
    case 'PONYTAIL':{
      addClipBase(g,m());
      g.add(mkMesh(new THREE.CylinderGeometry(0.265,0.265,0.09,24),m(),0,0.069,0));
      const tail=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.04,0.58,12),m());
      tail.position.set(0,0.02,-0.3); tail.rotation.x=-0.26; g.add(tail); break;}
    default: break;
  }
  g.traverse(c=>{if(c.isMesh)c.castShadow=true;});
  return g;
}

// ── ASSEMBLE — proportions from reference image ──
// Reference total height breakdown (normalized):
//   head: ~27%   torso: ~22%   hips+legs+feet: ~51%
function buildLego(hex,face='😐',hair='SHORT',hairHex='#1a1a1a'){
  const g=new THREE.Group();

  // Legs (y=0 is floor)
  const legs=makeLegs(hex); legs.position.y=0.38; g.add(legs);

  // Torso
  const torso=makeTorso(hex); torso.position.y=0.92; g.add(torso);

  // Arms — shoulder pivot at torso top sides
  const armL=makeArm(hex); armL.position.set(-0.425,1.04,0); g.add(armL);
  const armR=makeArm(hex); armR.position.set( 0.425,1.04,0); g.add(armR);

  // Head
  const head=makeHead(face); head.position.y=1.52; g.add(head);

  // Hair
  const hairG=makeHair(hair,hairHex); hairG.position.y=1.755; g.add(hairG);

  g.traverse(c=>{if(c.isMesh)c.castShadow=true;});
  g.userData={armL,armR,head,legs};
  return g;
}

const DEFS=[
  {name:'🔬 analyst',color:'#7c3aed',face:'😐',hair:'SHORT',hairColor:'#1a1a1a',pos:[-3,0,-2]},
  {name:'✍️ writer', color:'#059669',face:'🙂',hair:'LONG', hairColor:'#b07030',pos:[2,0,-3]},
  {name:'🔍 reviewer',color:'#d97706',face:'🧐',hair:'BALD', hairColor:'#1a1a1a',pos:[0,0,2]},
];
const agents=DEFS.map(d=>{
  const mesh=buildLego(d.color,d.face,d.hair,d.hairColor);
  mesh.position.set(...d.pos); scene.add(mesh);
  return{mesh,...d,pos:new THREE.Vector3(...d.pos),target:new THREE.Vector3(...d.pos),walkPhase:Math.random()*Math.PI*2,_pt:null};
});

const PAT=[
  [[-3,-2],[-1,-3],[-4,-1],[-2,-4]],
  [[2,-3],[4,-1],[3,1],[1,-2]],
  [[0,2],[2,3],[-1,3],[1,4]],
];
let meetingMode=false,selIdx=0;

function patrol(i){
  if(meetingMode)return;
  const a=agents[i],pts=PAT[i],pt=pts[Math.floor(Math.random()*pts.length)];
  a.target.set(pt[0],0,pt[1]);
}
agents.forEach((_,i)=>setTimeout(()=>patrol(i),i*600+300));

function rebuild(i){
  const a=agents[i]; scene.remove(a.mesh);
  const m=buildLego(a.color,a.face,a.hair,a.hairColor);
  m.position.copy(a.pos); m.rotation.y=a.mesh.rotation.y;
  scene.add(m); a.mesh=m;
}

const bubbleWrap=document.createElement('div');
bubbleWrap.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50;';
document.body.appendChild(bubbleWrap);

function showBubble(a,txt,dur=1400){
  removeBubble(a);
  const b=document.createElement('div');
  b.style.cssText='position:absolute;background:#fff;color:#1a1a1a;font:bold 13px monospace;padding:5px 10px;border-radius:12px 12px 12px 3px;border:2.5px solid #222;white-space:nowrap;transform:translate(-50%,-100%);transition:opacity .25s;box-shadow:2px 2px 0 #222;';
  b.textContent=txt;
  bubbleWrap.appendChild(b);
  a._bubble=b;
  clearTimeout(a._bubbleTimer);
  a._bubbleTimer=setTimeout(()=>{ if(b.parentNode){b.style.opacity='0'; setTimeout(()=>b.remove(),260);} a._bubble=null; },dur);
}
function removeBubble(a){ if(a._bubble){a._bubble.remove();a._bubble=null;} clearTimeout(a._bubbleTimer); }
function updateBubbles(){
  const rect=canvas.getBoundingClientRect();
  agents.forEach(a=>{
    if(!a._bubble)return;
    const wp=a.mesh.position.clone(); wp.y+=2.4;
    wp.project(camera);
    const x=(wp.x*.5+.5)*rect.width+rect.left;
    const y=(-wp.y*.5+.5)*rect.height+rect.top;
    a._bubble.style.left=x+'px'; a._bubble.style.top=y+'px';
  });
}

// ── CARTOON SOUND (Web Audio) ──
let _actx=null;
function getACtx(){ if(!_actx) _actx=new(window.AudioContext||window.webkitAudioContext)(); return _actx; }
function playBoing(type){
  try{
    const ctx=getACtx(), now=ctx.currentTime;
    const osc=ctx.createOscillator(), gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if(type==='hit'){
      osc.type='sawtooth';
      osc.frequency.setValueAtTime(700,now);
      osc.frequency.exponentialRampToValueAtTime(160,now+.32);
      gain.gain.setValueAtTime(.22,now);
      gain.gain.exponentialRampToValueAtTime(.001,now+.35);
      osc.start(now); osc.stop(now+.35);
      // extra click
      const o2=ctx.createOscillator(),g2=ctx.createGain();
      o2.connect(g2); g2.connect(ctx.destination);
      o2.frequency.setValueAtTime(1200,now); g2.gain.setValueAtTime(.08,now); g2.gain.exponentialRampToValueAtTime(.001,now+.05);
      o2.start(now); o2.stop(now+.05);
    } else if(type==='held'){
      osc.type='square';
      osc.frequency.setValueAtTime(500,now);
      osc.frequency.setValueAtTime(750,now+.07);
      osc.frequency.setValueAtTime(420,now+.14);
      osc.frequency.setValueAtTime(680,now+.21);
      gain.gain.setValueAtTime(.12,now); gain.gain.exponentialRampToValueAtTime(.001,now+.28);
      osc.start(now); osc.stop(now+.28);
    } else if(type==='drop'){
      osc.type='triangle';
      osc.frequency.setValueAtTime(300,now);
      osc.frequency.exponentialRampToValueAtTime(80,now+.2);
      gain.gain.setValueAtTime(.18,now); gain.gain.exponentialRampToValueAtTime(.001,now+.25);
      osc.start(now); osc.stop(now+.25);
    }
  }catch(e){}
}

        mg.gain.setValueAtTime(.16,now); mg.gain.exponentialRampToValueAtTime(.001,now+.58);
      } else {
        car.frequency.setValueAtTime(380,now); car.frequency.exponentialRampToValueAtTime(220,now+.22);
        mg.gain.setValueAtTime(.14,now); mg.gain.exponentialRampToValueAtTime(.001,now+.28);
      }
      car.start(now); car.stop(now+.6);
    }
  },
];

// SpeechSynthesis for text (with best cartoon voice)
let _voices=[];
if(window.speechSynthesis){
  const loadV=()=>{_voices=window.speechSynthesis.getVoices();};
  loadV(); window.speechSynthesis.onvoiceschanged=loadV;
}
function speakSimpsons(agentIdx,type){
  try{ getACtx(); }catch(e){}
  const char=SIMPCHARS[agentIdx%SIMPCHARS.length];
  const lines=char[type];
  const text=lines[Math.floor(Math.random()*lines.length)];
  // Play FM synth voice
  try{
    const ctx=getACtx();
    char.synth(ctx,ctx.currentTime,type);
  }catch(e){}
  // Also speak text with best available voice
  if(window.speechSynthesis&&_voices.length){
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    // Homer=deep, Bart=high, Lisa=medium
    const pitches=[0.6,1.55,1.2]; const rates=[0.82,1.3,1.05];
    u.pitch=pitches[agentIdx%3]; u.rate=rates[agentIdx%3]; u.volume=0.8;
    // macOS character voices
    const charNames=[['bad news','fred','daniel'],['junior','ralph','bubbles'],['karen','samantha','victoria']];
    const wanted=charNames[agentIdx%3];
    const pick=_voices.find(v=>wanted.some(n=>v.name.toLowerCase().includes(n))&&v.lang.startsWith('en'))
             ||_voices.find(v=>v.lang.startsWith('en'))
             ||_voices[0];
    if(pick) u.voice=pick;
    window.speechSynthesis.speak(u);
  }
  return text;
}

const OUCH=["D'oh!","Ay caramba!","Ow!","That smarts!","Yikes!"];
const HELD=["Put me down!","Cowabunga!","Help!","Let go!","Marge!!"];
const DROP=["D'oh.","Radical.","I'm okay!","Ow my bones."];

// ── RAYCASTER ──
const rc=new THREE.Raycaster();
const liftPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);

function ndcFromEvent(e){
  const r=canvas.getBoundingClientRect();
  return new THREE.Vector2(
    (e.clientX-r.left)/r.width*2-1,
    -((e.clientY-r.top)/r.height)*2+1
  );
}
function pickAgentIdx(e){
  rc.setFromCamera(ndcFromEvent(e),camera);
  for(let i=0;i<agents.length;i++){
    const meshes=[]; agents[i].mesh.traverse(c=>{if(c.isMesh)meshes.push(c);});
    if(rc.intersectObjects(meshes).length>0) return i;
  }
  return -1;
}
function mouseTo3D(e,y){
  const pt=new THREE.Vector3();
  rc.setFromCamera(ndcFromEvent(e),camera);
  liftPlane.constant=-y;
  rc.ray.intersectPlane(liftPlane,pt);
  return pt;
}

// ── SELECTION RING (Three.js torus under selected agent) ──
const selRingGeo=new THREE.TorusGeometry(0.52,0.045,8,32);
const selRingMat=new THREE.MeshBasicMaterial({color:0x6366f1,transparent:true,opacity:0.85});
const selRing=new THREE.Mesh(selRingGeo,selRingMat);
selRing.rotation.x=Math.PI/2; selRing.visible=false; scene.add(selRing);

let selectedAgentIdx=-1;

function updateChatPos(){ /* chat input is fixed, no tracking needed */ }

// Show HTML content in speech bubble (supports typing dots)
function showBubbleHTML(a,html,dur){
  removeBubble(a);
  const b=document.createElement('div');
  b.style.cssText='position:absolute;background:#fff;color:#1a1a1a;font:bold 13px monospace;padding:7px 12px;border-radius:12px 12px 12px 3px;border:2.5px solid #222;white-space:nowrap;transform:translate(-50%,-100%);pointer-events:none;box-shadow:2px 2px 0 #222;transition:opacity .2s;';
  b.innerHTML=html;
  bubbleWrap.appendChild(b);
  a._bubble=b;
  if(dur&&dur<99999){
    clearTimeout(a._bubbleTimer);
    a._bubbleTimer=setTimeout(()=>{if(b.parentNode){b.style.opacity='0';setTimeout(()=>b.remove(),220);}a._bubble=null;},dur);
  }
  return b;
}

function selectAgent(idx){
  selectedAgentIdx=idx;
  const a=agents[idx];
  selRing.visible=true;
  const inp=document.getElementById('chat-input');
  inp.classList.add('open');
  inp.value='';
  // Quirky greeting in bubble above head
  const greets=["...응?","뭐야.","찹츄?","왜 불러요","바빠요","니옹스?","...","으잉?"];
  showBubble(a,greets[Math.floor(Math.random()*greets.length)],1800);
  setTimeout(()=>inp.focus(),60);
}

window.closeChat=function(){
  document.getElementById('chat-input').classList.remove('open');
  selRing.visible=false; selectedAgentIdx=-1;
};

// ── 클릭/터치 반응 (뜬금없는 말) ──
const QUIRKY_HIT=[
  "찹츄?","니옹스?","뭘 봐요","배고파","졸려","...","흠","으잉?",
  "왜 때려요","아 진짜","어쩌라고","D'oh","살살 좀","야!","헉",
  "왜요?","뭐임","어...","아 몰라","조심하세요","손 치워요","퉤",
];

// ── 채팅 대답 (에이전트별 실제 응답 스타일) ──
// 실제 OMC WebSocket 연동 전 placeholder
const AGENT_REPLIES=[
  // analyst (Homer-ish but smart)
  ["분석해볼게요. 잠깐만요.","좋은 질문이에요. 데이터 보면..","알겠어요. 검토 시작할게요.","그 부분은 제가 맡을게요.","흠, 흥미롭네요."],
  // writer (Bart-ish, casual)
  ["바로 써드릴게요!","오케이 오케이, 해볼게요.","그거 재밌겠다, 고고!","알겠어요. 금방이요.","드래프트 만들어볼게요."],
  // reviewer (Lisa-ish, precise)
  ["코드 살펴볼게요.","논리적으로 검토해드릴게요.","이슈 찾아드릴게요.","꼼꼼하게 확인할게요.","리뷰 시작합니다."],
];

// Enter on input → typing dots → proper agent reply
document.getElementById('chat-input').addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeChat(); return; }
  if(e.key!=='Enter') return;
  e.preventDefault();
  const inp=e.target; const txt=inp.value.trim();
  if(!txt||selectedAgentIdx<0) return;
  inp.value='';
  const a=agents[selectedAgentIdx];
  const replies=AGENT_REPLIES[selectedAgentIdx%3];
  showBubbleHTML(a,'<span class="bubble-dots"><span></span><span></span><span></span></span>',99999);
  setTimeout(()=>{
    showBubble(a,replies[Math.floor(Math.random()*replies.length)],2800);
    inp.focus();
  },600+Math.random()*600);
});

// Add state to each agent
agents.forEach(a=>{
  a.state='normal'; // normal | hit | held | drop
  a.hitTimer=0; a._bubble=null; a._bubbleTimer=null;
  a.heldPos=new THREE.Vector3(); a.dropVel=0; a._soundTimer=0;
});

let heldIdx=-1, mouseDown=false, mouseDownIdx=-1, mouseDownTime=0, mouseMoved=false, mouseDownPos={x:0,y:0};

canvas.addEventListener('mousedown',e=>{
  if(e.button!==0)return;
  mouseDown=true; mouseMoved=false;
  mouseDownTime=Date.now();
  mouseDownPos={x:e.clientX,y:e.clientY};
  mouseDownIdx=pickAgentIdx(e);
});

canvas.addEventListener('mousemove',e=>{
  if(!mouseDown||mouseDownIdx<0)return;
  const dx=e.clientX-mouseDownPos.x, dy=e.clientY-mouseDownPos.y;
  if(!mouseMoved&&Math.sqrt(dx*dx+dy*dy)>6) mouseMoved=true;
  if(!mouseMoved) return;
  // Dragging → pick up
  const a=agents[mouseDownIdx];
  if(a.state==='normal'||a.state==='hit'){
    a.state='held'; heldIdx=mouseDownIdx;
    const txt=speakSimpsons(mouseDownIdx,'held');
    showBubble(a,txt||HELD[Math.floor(Math.random()*HELD.length)],99999);
    a._soundTimer=1.8;
  }
  if(a.state==='held'){
    const p=mouseTo3D(e,2.6);
    if(p) a.heldPos.copy(p);
  }
});

canvas.addEventListener('mouseup',e=>{
  mouseDown=false;
  if(heldIdx>=0){
    // Dropped
    const a=agents[heldIdx];
    if(a.state==='held'){
      a.state='drop'; a.dropVel=0; a.pos.x=a.heldPos.x; a.pos.z=a.heldPos.z;
      const txt=speakSimpsons(heldIdx,'drop');
      showBubble(a,txt||DROP[Math.floor(Math.random()*DROP.length)],1200);
    }
    mouseDownIdx=-1; heldIdx=-1;
  } else if(mouseDownIdx>=0&&!mouseMoved){
    // Short click with no drag → select agent
    const dt=Date.now()-mouseDownTime;
    if(dt<400){
      selectAgent(mouseDownIdx);
    } else {
      // Long click = hit reaction
      const a=agents[mouseDownIdx];
      if(a.state==='normal'){
        a.state='hit'; a.hitTimer=0.55;
        const txt=speakSimpsons(mouseDownIdx,'hit');
        showBubble(a,txt||OUCH[Math.floor(Math.random()*OUCH.length)],1200);
      }
    }
    mouseDownIdx=-1;
  } else {
    mouseDownIdx=-1; heldIdx=-1;
  }
});

let zoomDist=21;
window.addEventListener('wheel',e=>{ zoomDist=Math.max(8,Math.min(36,zoomDist+e.deltaY*0.018)); });

const clock=new THREE.Clock();
function frame(){
  requestAnimationFrame(frame);
  const dt=Math.min(clock.getDelta(),0.05),t=clock.getElapsedTime();
  const dir=camera.position.clone().normalize().multiplyScalar(zoomDist);
  camera.position.lerp(dir,0.07); camera.lookAt(0,0.9,0);

  agents.forEach((a,i)=>{
    const ud=a.mesh.userData;

    // ── HELD state ──
    if(a.state==='held'){
      a.mesh.position.lerp(a.heldPos,0.25);
      a.mesh.rotation.z=Math.sin(t*7+a.walkPhase)*0.28;
      a.mesh.rotation.x=Math.sin(t*5.3+a.walkPhase)*0.14;
      const ph=t*18+a.walkPhase;
      if(ud.armL){ud.armL.rotation.x=Math.sin(ph)*1.1; ud.armL.rotation.z=Math.sin(ph*.6)*.55;}
      if(ud.armR){ud.armR.rotation.x=-Math.sin(ph)*1.1; ud.armR.rotation.z=-Math.sin(ph*.6)*.55;}
      if(ud.legs) ud.legs.children.forEach((c,ci)=>{c.rotation.x=Math.sin(ph+(ci*.8))*.7;});
      a._soundTimer-=dt;
      if(a._soundTimer<=0){
        try{ const ctx=getACtx(); SIMPCHARS[i%SIMPCHARS.length].synth(ctx,ctx.currentTime,'held'); }catch(e){}
        a._soundTimer=0.7+Math.random()*0.4;
      }
      updateBubbles(); return;
    }

    // ── DROP state ──
    if(a.state==='drop'){
      a.dropVel-=18*dt;
      const ny=a.mesh.position.y+a.dropVel*dt;
      if(ny<=0){
        a.mesh.position.y=0; a.pos.y=0;
        if(Math.abs(a.dropVel)>2){ a.dropVel=-a.dropVel*.38; }
        else{ a.state='normal'; a.dropVel=0; a.mesh.rotation.z=0; a.mesh.rotation.x=0; }
      } else { a.mesh.position.y=ny; }
      updateBubbles(); return;
    }

    // ── HIT reaction ──
    if(a.state==='hit'){
      a.hitTimer-=dt;
      a.mesh.rotation.z=Math.sin(a.hitTimer*22)*0.35*Math.max(0,a.hitTimer/0.55);
      if(ud.armL){ud.armL.rotation.x=-1.0; ud.armL.rotation.z=0.4;}
      if(ud.armR){ud.armR.rotation.x=-0.8; ud.armR.rotation.z=-0.4;}
      if(a.hitTimer<=0){ a.state='normal'; a.mesh.rotation.z=0; removeBubble(a); }
      updateBubbles(); return;
    }

    // ── NORMAL patrol/walk ──
    a.mesh.rotation.z*=0.85; a.mesh.rotation.x*=0.85;
    const dx=a.target.x-a.pos.x,dz=a.target.z-a.pos.z;
    const dist=Math.sqrt(dx*dx+dz*dz),walking=dist>0.06;
    if(walking){
      const step=Math.min(dist,2.2*dt);
      a.pos.x+=dx/dist*step; a.pos.z+=dz/dist*step;
      a.mesh.rotation.y=Math.atan2(dx,dz);
    } else if(!meetingMode&&!a._pt){
      a._pt=setTimeout(()=>{ a._pt=null; patrol(i); },900+Math.random()*1300);
    }
    a.mesh.position.set(a.pos.x,0,a.pos.z);
    if(walking){
      const ph=t*8+a.walkPhase;
      if(ud.armL){ud.armL.rotation.x=-Math.sin(ph)*.38; ud.armL.rotation.z=0;}
      if(ud.armR){ud.armR.rotation.x= Math.sin(ph)*.38; ud.armR.rotation.z=0;}
      if(ud.legs) ud.legs.children.forEach((c,ci)=>{if(ci>=2&&ci<=5)c.rotation.x=(ci%2===0?1:-1)*Math.sin(ph)*.4;});
      a.mesh.position.y=Math.abs(Math.sin(ph*.5))*.05;
    } else {
      if(ud.armL){ud.armL.rotation.x*=.87; ud.armL.rotation.z*=.87;}
      if(ud.armR){ud.armR.rotation.x*=.87; ud.armR.rotation.z*=.87;}
      a.mesh.position.y=Math.sin(t*1.8+a.walkPhase)*.024;
      if(ud.head) ud.head.rotation.y=Math.sin(t*.62+a.walkPhase)*.12;
    }
  });
  // Update floating chat bubble position
  updateChatPos();
  // Update selection ring position + pulse
  if(selectedAgentIdx>=0&&selRing.visible){
    const sa=agents[selectedAgentIdx];
    selRing.position.set(sa.mesh.position.x,0.01,sa.mesh.position.z);
    const pulse=0.92+Math.sin(t*4)*0.08;
    selRing.scale.set(pulse,1,pulse);
    selRingMat.opacity=0.6+Math.sin(t*4)*0.25;
  }
  updateBubbles();
  renderer.render(scene,camera);
}
frame();

document.addEventListener('keydown',e=>{
  if(e.key==='m'||e.key==='M'){ meetingMode=true; agents[0].target.set(-0.8,0,0.2); agents[1].target.set(0.8,0,0.2); }
  if(e.key==='r'||e.key==='R') location.reload();
});

} catch(e) {
  const b = document.getElementById('errbox');
  b.style.display='block';
  b.textContent = 'CAUGHT: ' + e.message + '\n' + e.stack;
}
</script>
